name: panikasog
description: Community disaster response app – PANIKASOG
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  share_plus: ^10.0.0
  url_launcher: ^6.3.1

  # State Management
  provider: ^6.1.2

  # Firebase (latest stable versions)
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_app_check: ^0.3.1+3  # ← add here
  google_sign_in: ^6.3.0

  # Navigation & UI
  go_router: ^14.8.1
  percent_indicator: ^4.2.3

  # Maps & Location
  google_maps_flutter: ^2.12.0
  google_maps_flutter_android: ^2.14.1
  google_maps_flutter_platform_interface: ^2.8.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: 12.0.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.1
  uuid: ^4.5.1
  shared_preferences: ^2.5.2
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0 # for the app icon

# app icon
flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/favicon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
